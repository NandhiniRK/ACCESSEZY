{% extends "base.html" %}
{% block title %}Login – Accessezy{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<!-- ══ AUTH CARD ══════════════════════════════════════════════════
     Premium auth card with:
     - Display font (Fraunces) for logo & title
     - Dot-grid + radial gradient background
     - Strong shadow and large border-radius
     - Clear visual hierarchy with uppercase labels
════════════════════════════════════════════════════════════ -->
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">Accessezy ✨</div>
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Log in to your teacher or parent account</p>

        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email"
                       placeholder="you@email.com" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Your password" required autocomplete="new-password">
            </div>

            <button type="submit" class="auth-btn">Log In →</button>
        </form>

        <p class="auth-switch">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
